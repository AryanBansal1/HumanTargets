<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            display: flex;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 700px;
        }
        .form-container {
            flex: 1;
            padding: 20px;
        }
        .separator {
            width: 2px;
            background: #ccc;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #218838;
        }
        .login-link {
            text-align: center;
            margin-top: 10px;
        }
        .login-link a {
            color: #007bff;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2>Donor Registration</h2>
            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email ID" required>
                <input type="text" placeholder="Phone Number" required>
                <input type="text" placeholder="Rasan Card Number" required>
                <button type="submit">Register Now</button>
                <div class="login-link">Already Registered? <a href="#">Login</a></div>
            </form>
        </div>
        <div class="separator"></div>
        <div class="form-container">
            <h2>Recipient Registration</h2>
            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email ID" required>
                <input type="text" placeholder="Phone Number" required>
                <input type="text" placeholder="Rasan Card Number" required>
                <button type="submit">Register Now</button>
                <div class="login-link">Already Registered? <a href="#">Login</a></div>
            </form>
        </div>
    </div>
</body>
</html>
